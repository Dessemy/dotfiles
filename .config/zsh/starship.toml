"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:#313244)\
$os\
$username\
[](bg:#fab387 fg:#313244)\
$directory\
[](fg:#fab387 bg:#a6e3a1)\
$git_branch\
$git_status\
[](fg:#a6e3a1 bg:#94e2d5)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:#94e2d5 bg:#89b4fa)\
$docker_context\
[](fg:#89b4fa bg:#cba6f7)\
$time\
[ ](fg:#cba6f7)\
$line_break$character"""

[os]
disabled = false
style = "bg:#313244 fg:#cdd6f4"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = ""
Manjaro = ""
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = ""
Amazon = ""
Android = ""
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = ""
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:#313244 fg:#cdd6f4"
style_root = "bg:#313244 fg:#cdd6f4"
format = '[ $user ]($style)'

[directory]
style = "fg:#181825 bg:#fab387"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol $branch ](fg:#1e1e2e bg:#a6e3a1)]($style)'

[git_status]
style = "bg:#94e2d5"
format = '[[($all_status$ahead_behind )](fg:#1e1e2e bg:#a6e3a1)]($style)'

[nodejs]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[c]
symbol = " "
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[rust]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[golang]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[php]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[java]
symbol = " "
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[kotlin]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[haskell]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[python]
symbol = ""
style = "bg:#94e2d5"
format = '[[ $symbol( $version) ](fg:#1e1e2e bg:#94e2d5)]($style)'

[docker_context]
symbol = ""
style = "bg:#181825"
format = '[[ $symbol( $context) ](fg:#83a598 bg:#585b70)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#fab387"
format = '[[  $time ](fg:#181825 bg:#cba6f7)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:#a6e3a1)'
error_symbol = '[](bold fg:#f38ba8)'
vimcmd_symbol = '[](bold fg:#a6e3a1)'
vimcmd_replace_one_symbol = '[](bold fg:#cba6f7)'
vimcmd_replace_symbol = '[](bold fg:#cba6f7)'
vimcmd_visual_symbol = '[](bold fg:#b4befe)'
